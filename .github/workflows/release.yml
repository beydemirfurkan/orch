name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      npm_published: ${{ steps.npm_publish_gate.outputs.published }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Capture release metadata
        id: release_meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install npm metadata dependencies
        run: npm ci

      - name: Verify tag version matches package metadata
        run: node scripts/check-release-version.js "${GITHUB_REF_NAME}"

      - name: Run test suite
        run: go test ./...

      - name: Preview npm package contents
        run: npm pack --dry-run

      - name: Build binaries and publish GitHub release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether npm version already exists
        id: npm_publish_gate
        run: |
          published=$(node scripts/check-npm-published.js "${{ steps.release_meta.outputs.version }}")
          echo "published=$published" >> "$GITHUB_OUTPUT"

      - name: Publish npm package
        if: steps.npm_publish_gate.outputs.published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Confirm npm publish availability
        run: |
          for attempt in $(seq 1 12); do
            published=$(node scripts/check-npm-published.js "${{ steps.release_meta.outputs.version }}")
            if [ "$published" = "true" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "npm package orch-code@${{ steps.release_meta.outputs.version }} did not become available in time" >&2
          exit 1

  smoke-install:
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Wait for package propagation
        run: |
          for attempt in $(seq 1 18); do
            version=$(npm view "orch-code@${{ needs.release.outputs.version }}" version 2>/dev/null || true)
            if [ "$version" = "${{ needs.release.outputs.version }}" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "orch-code@${{ needs.release.outputs.version }} was not readable from npm in time" >&2
          exit 1

      - name: Install released package globally
        run: npm install -g "orch-code@${{ needs.release.outputs.version }}"

      - name: Verify installed CLI
        run: |
          orch --version
          orch --help
