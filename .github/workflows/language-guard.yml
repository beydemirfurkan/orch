name: Language Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  english-only-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run language guard
        run: bash scripts/check-language.sh
